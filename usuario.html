<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registro Profesional de Usuario</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
    font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
    background:linear-gradient(-45deg,#ee7752,#e73c7e,#23a6d5,#23d5ab);
    background-size:400% 400%;
    animation:gradientShift 15s ease infinite;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:20px;
    overflow-x:hidden;
    position:relative;
}
@keyframes gradientShift{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}
.floating-link{
    position:fixed;
    top:30px;
    right:30px;
    z-index:1000;
    background:rgba(255,255,255,.15);
    backdrop-filter:blur(20px);
    border:1px solid rgba(255,255,255,.2);
    padding:15px 25px;
    border-radius:50px;
    color:#fff;
    text-decoration:none;
    font-weight:600;
    font-size:14px;
    display:flex;
    align-items:center;
    gap:10px;
    transition:.4s;
    box-shadow:0 10px 30px rgba(0,0,0,.2);
    animation:floatLink 3s ease-in-out infinite;
}
@keyframes floatLink{
    0%,100%{transform:translateY(0);box-shadow:0 10px 30px rgba(0,0,0,.2);}
    50%{transform:translateY(-10px);box-shadow:0 20px 40px rgba(0,0,0,.3);}
}
.floating-link:hover{
    transform:translateY(-5px) scale(1.05);
    background:rgba(255,255,255,.25);
    box-shadow:0 20px 50px rgba(0,0,0,.3);
}
.floating-link i{font-size:18px;transition:.3s;}
.floating-link:hover i{transform:scale(1.2) rotate(10deg);}
.particles{
    position:fixed;
    top:0;left:0;
    width:100%;height:100%;
    pointer-events:none;
    z-index:1;
}
.particle{
    position:absolute;
    width:4px;height:4px;
    background:rgba(255,255,255,.5);
    border-radius:50%;
    animation:float 6s infinite linear;
}
@keyframes float{
    0%{transform:translateY(100vh) rotate(0);opacity:0;}
    10%,90%{opacity:1;}
    100%{transform:translateY(-100px) rotate(360deg);opacity:0;}
}
.container{
    background:rgba(255,255,255,.1);
    backdrop-filter:blur(20px);
    border:1px solid rgba(255,255,255,.2);
    padding:50px 40px;
    border-radius:24px;
    box-shadow:0 25px 45px rgba(0,0,0,.1),0 0 0 1px rgba(255,255,255,.05);
    width:100%;
    max-width:500px;
    position:relative;
    z-index:10;
    animation:containerSlide .8s cubic-bezier(.25,.46,.45,.94);
}
@keyframes containerSlide{
    from{opacity:0;transform:translateY(50px) scale(.95);}
    to{opacity:1;transform:translateY(0) scale(1);}
}
.header{text-align:center;margin-bottom:40px;}
.logo{
    width:60px;height:60px;
    background:linear-gradient(135deg,#667eea,#764ba2);
    border-radius:16px;
    display:flex;
    align-items:center;
    justify-content:center;
    margin:0 auto 20px;
    box-shadow:0 10px 30px rgba(102,126,234,.3);
    animation:pulse 2s infinite;
}
@keyframes pulse{
    0%,100%{transform:scale(1);}
    50%{transform:scale(1.05);}
}
.header h1{
    color:#fff;
    font-size:32px;
    font-weight:700;
    margin-bottom:8px;
}
.header p{color:rgba(255,255,255,.9);}
.form-group{margin-bottom:28px;}
.form-group label{
    display:block;
    margin-bottom:10px;
    color:rgba(255,255,255,.95);
    font-size:14px;
}
.form-group input{
    width:100%;
    padding:18px 24px;
    border:2px solid rgba(255,255,255,.2);
    border-radius:16px;
    background:rgba(255,255,255,.1);
    color:#fff;
    transition:.4s;
}
.form-group input::placeholder{color:rgba(255,255,255,.6);}
.form-group input:focus{
    outline:none;
    border-color:rgba(255,255,255,.5);
    background:rgba(255,255,255,.15);
    box-shadow:0 0 0 4px rgba(255,255,255,.1);
    transform:translateY(-3px);
}
.form-row{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:24px;
}
.btn-agregar{
    width:100%;
    padding:20px;
    background:linear-gradient(135deg,#ff6b6b,#feca57);
    color:#fff;
    border:none;
    border-radius:16px;
    font-size:18px;
    cursor:pointer;
    transition:.4s;
    text-transform:uppercase;
}
.btn-agregar:hover{transform:translateY(-5px);}
.success-message{
    display:none;
    background:linear-gradient(135deg,#56ab2f,#a8e6cf);
    color:#fff;
    padding:20px;
    border-radius:16px;
    text-align:center;
    margin-top:20px;
}
@media(max-width:520px){
    .form-row{grid-template-columns:1fr;}
    .container{padding:40px 30px;}
    .floating-link{top:20px;right:20px;}
}
</style>
</head>

<body>

<a href="login.html" class="floating-link">
<i class="fas fa-home"></i>Login
</a>

<div class="particles" id="particles"></div>

<div class="container">
<div class="header">
<div class="logo">
<i class="fas fa-users" style="font-size:24px;color:white;"></i>
</div>
<h1>Registro Completo</h1>
<p>Ingresa todos los datos del usuario de forma segura</p>
</div>

<form id="registroForm">

<div class="form-row">
<div class="form-group">
<label for="nombre"><i class="fas fa-user icon"></i>Nombre</label>
<input type="text" id="nombre" required placeholder="Nombre completo">
</div>
<div class="form-group">
<label for="apellido"><i class="fas fa-user-tag icon"></i>Apellido</label>
<input type="text" id="apellido" required placeholder="Apellido completo">
</div>
</div>

<div class="form-group">
<label for="email"><i class="fas fa-envelope icon"></i>Email</label>
<input type="email" id="email" required placeholder="usuario@empresa.com">
</div>

<div class="form-group">
<label for="telefono"><i class="fas fa-phone icon"></i>Teléfono</label>
<input type="tel" id="telefono" required placeholder="+1 (555) 123-4567">
</div>

<div class="form-group">
<label for="direccion"><i class="fas fa-map-marker-alt icon"></i>Dirección</label>
<input type="text" id="direccion" required placeholder="Calle 123 #45-67, Ciudad, País">
</div>

<button type="submit" class="btn-agregar">
<i class="fas fa-user-plus icon"></i>Agregar Usuario
</button>

<div class="success-message" id="successMessage">
<i class="fas fa-check-circle" style="font-size:48px;"></i>
<h3>¡Usuario registrado exitosamente!</h3>
<p>Todos los datos han sido guardados correctamente</p>
</div>

</form>
</div>

<script>
function createParticles(){
    const c=document.getElementById('particles');
    for(let i=0;i<50;i++){
        const p=document.createElement('div');
        p.className='particle';
        p.style.left=Math.random()*100+'%';
        p.style.animationDelay=Math.random()*6+'s';
        p.style.animationDuration=(Math.random()*3+4)+'s';
        c.appendChild(p);
    }
}
document.getElementById('registroForm').addEventListener('submit',function(e){
    e.preventDefault();
    setTimeout(()=>{
        document.querySelector('.btn-agregar').style.display='none';
        document.getElementById('successMessage').style.display='block';
        setTimeout(()=>{
            document.querySelector('.btn-agregar').style.display='block';
            document.getElementById('successMessage').style.display='none';
            this.reset();
        },3000);
    },800);
});
createParticles();
</script>

</body>
</html>
