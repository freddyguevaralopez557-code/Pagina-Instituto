<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- ARCHIVO CSS -->
    <link rel="stylesheet" href="estilos.css">
</head>

<body>

    <!-- NAVBAR -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">
                <h2>🎓 Instituto Técnico</h2>
            </div>

            <ul class="nav-menu">
                <li><a href="index.html" class="nav-link">🏠 Inicio</a></li>
                <li><a href="productos.html" class="nav-link">🛒 Productos</a></li>
                <li><a href="mision.html" class="nav-link">🎯 Misión</a></li>
                <li><a href="vision.html" class="nav-link">🌟 Visión</a></li>
                <li><a href="quienes-somos.html" class="nav-link">👥 Quiénes</a></li>
                <li><a href="admision.html" class="nav-link">📚 Admisión</a></li>

                <!-- ACTIVO -->
                <li><a href="contacto.html" class="nav-link active">📧 Contacto</a></li>
            </ul>
        </div>
    </nav>

    <!-- CONTENIDO -->
    <main class="container">

        <section class="hero">
            <h1 class="hero-title">
                📧 <span class="gradient-text">Contacto</span>
            </h1>

            <p class="hero-subtitle">
                Déjanos tu mensaje y te responderemos pronto
            </p>
        </section>

        <section>

            <form id="formContacto">

                <div class="form-group">
                    <label for="nombre">👤 Nombre completo</label>
                    <input type="text" id="nombre" name="nombre" required>
                </div>

                <div class="form-group">
                    <label for="correo">✉️ Correo electrónico</label>
                    <input type="email" id="correo" name="correo" required>
                </div>

                <div class="form-group">
                    <label for="telefono">📱 Teléfono</label>
                    <input type="tel" id="telefono" name="telefono" required>
                </div>

                <div class="form-group">
                    <label for="comentario">💬 Tu mensaje</label>

                    <textarea 
                        id="comentario" 
                        name="comentario"
                        placeholder="Cuéntanos qué necesitas..."
                        required>
                    </textarea>
                </div>

                <button type="submit" class="cta-button primary">
                    🚀 Enviar Mensaje
                </button>

                <div id="mensaje" class="mensaje"></div>

            </form>

        </section>

    </main>

    <!-- FOOTER -->
    <footer class="footer">
        <p>&copy; 2024 Instituto Técnico</p>
    </footer>

    <script>

        document.getElementById('formContacto')
        .addEventListener('submit', function(e) {

            e.preventDefault();

            const nombre = document.getElementById('nombre').value;

            const mensaje = document.getElementById('mensaje');

            mensaje.innerHTML =
            `✨ ¡Gracias <strong>${nombre}</strong>!
            <br> Tu mensaje ha sido enviado correctamente.
            <br> Te contactaremos pronto 📲`;

            mensaje.style.display = 'block';

            this.reset();

            setTimeout(() => {
                mensaje.style.display = 'none';
            }, 6000);

        });

    </script>

</body>
</html>
